services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: nevet
      POSTGRES_USER: nevet
      POSTGRES_PASSWORD: nevet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  ui-nextjs:
    build:
      context: ./ui-nextjs
      args:
        NEXT_PUBLIC_UI_COMMIT: ${NEXT_PUBLIC_UI_COMMIT:-unknown}
        NEXT_PUBLIC_UI_BRANCH: ${NEXT_PUBLIC_UI_BRANCH:-unknown}
    profiles: ["ui-nextjs"]
    ports:
      - "3000:3000"
    environment:
      - HOSTNAME=0.0.0.0
      - BACKEND_SCHEME=http
      - BACKEND_HOST=backend:8080
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit
    profiles: ["mail"]
    ports:
      - "3025:1025"
      - "8025:8025"
    restart: unless-stopped

  ui-reference:
    build: ./ui-reference
    profiles: ["ui-reference"]
    ports:
      - "3001:3001"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  ui-basic:
    build:
      context: .
      dockerfile: ui-basic/Dockerfile
    profiles: ["ui-basic"]
    ports:
      - "3003:3003"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build: .
    profiles: ["backend"]
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      - DB_URL=jdbc:postgresql://db:5432/nevet
      - DB_USERNAME=${DB_USERNAME:-nevet}
      - DB_PASSWORD=${DB_PASSWORD:-nevet}
      - CONSOLE_ENABLED=${CONSOLE_ENABLED:-false}
      - IRC_ENABLED=${IRC_ENABLED:-false}
      - DISCORD_ENABLED=${DISCORD_ENABLED:-false}
      - SLACK_ENABLED=${SLACK_ENABLED:-false}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:3003}
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/features"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
    restart: unless-stopped

volumes:
  pgdata:
