# bytecode.news nginx configuration
#
# Multi-frontend reverse proxy for Nevet.
# Each frontend gets its own subdomain, all sharing the same backend API.
#
# Deployment order:
#   1. Deploy this config (HTTP-only) and reload nginx
#   2. sudo mkdir -p /var/www/certbot
#   3. Issue certificates using webroot authentication:
#      sudo certbot certonly --webroot -w /var/www/certbot \
#        -d bytecode.news -d www.bytecode.news \
#        -d nextjs.bytecode.news -d primate.bytecode.news \
#        -d reference.bytecode.news
#   4. Uncomment the HTTPS server blocks and the HTTP redirect at the bottom
#   5. sudo nginx -t && sudo systemctl reload nginx
#
# Each server block includes a /.well-known/acme-challenge/ location so
# certbot's HTTP-01 challenges resolve without hitting the proxy.
#
# To add a new frontend:
#   1. Copy both the HTTP and HTTPS blocks for an existing frontend
#   2. Change server_name to the new subdomain
#   3. Change proxy_pass in the "/" location to the new frontend's port
#   4. Deploy the HTTP block first, reload nginx
#   5. Run certbot: sudo certbot certonly --webroot -w /var/www/certbot -d <subdomain>
#   6. Uncomment the HTTPS block, reload nginx
#   7. Add the new origin to the backend's CORS_ORIGINS env var and restart
#
# Wildcard TLS alternative (requires Cloudflare DNS):
#   sudo certbot certonly --dns-cloudflare \
#     --dns-cloudflare-credentials /etc/letsencrypt/cloudflare.ini \
#     -d bytecode.news -d '*.bytecode.news'
#   Then uncomment the HTTPS blocks (all use the same wildcard cert).

# Backend API - all frontends share this upstream
upstream backend {
    server localhost:8080;
}

# ===========================================================================
# HTTP server blocks
# These handle plain HTTP and certbot challenge responses.
# After TLS is configured, they redirect to HTTPS.
# ===========================================================================

# ---------------------------------------------------------------------------
# Primary domain
# Change the proxy_pass port in "/" to switch the primary frontend.
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name bytecode.news www.bytecode.news;

    # certbot HTTP-01 challenge responses
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # After enabling HTTPS below, replace everything from here down with:
    #   return 301 https://$host$request_uri;

    location /api/ {
        proxy_pass http://backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------------------------------------------------------------------------
# Frontend: Next.js (in-repo frontend/)
# Port 3000
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name nextjs.bytecode.news;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # After enabling HTTPS below, replace everything from here down with:
    #   return 301 https://$host$request_uri;

    location /api/ {
        proxy_pass http://backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------------------------------------------------------------------------
# Frontend: Primate (placeholder - blue's implementation)
# Port 4000
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name primate.bytecode.news;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # After enabling HTTPS below, replace everything from here down with:
    #   return 301 https://$host$request_uri;

    location /api/ {
        proxy_pass http://backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://localhost:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------------------------------------------------------------------------
# Frontend: Reference UI (vanilla JS, static files)
# Serves pre-built static files from dist/ with SPA fallback.
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name reference.bytecode.news;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # After enabling HTTPS below, replace everything from here down with:
    #   return 301 https://$host$request_uri;

    location /api/ {
        proxy_pass http://backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /opt/nevet/reference-ui/dist;
        try_files $uri $uri/ /index.html;
    }
}

