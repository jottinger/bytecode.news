# bytecode.news nginx configuration
#
# Multi-frontend reverse proxy for Nevet.
# Each frontend gets its own subdomain, all sharing the same backend API.
#
# To add a new frontend:
#   1. Copy one of the "Frontend" server blocks below
#   2. Change server_name to the new subdomain
#   3. Change proxy_pass in the "/" location to the new frontend's port
#   4. Add the new subdomain to the HTTP -> HTTPS redirect block
#   5. Run certbot for the new subdomain (if not using a wildcard cert)
#   6. Add the new origin to the backend's CORS_ORIGINS env var
#   7. Test: sudo nginx -t && sudo systemctl reload nginx
#
# TLS certificates (Let's Encrypt via certbot):
#   Per-subdomain:
#     sudo certbot --nginx -d bytecode.news -d www.bytecode.news \
#       -d nextjs.bytecode.news -d primate.bytecode.news
#   Wildcard (requires Cloudflare DNS):
#     sudo certbot certonly --dns-cloudflare \
#       --dns-cloudflare-credentials /etc/letsencrypt/cloudflare.ini \
#       -d bytecode.news -d '*.bytecode.news'

# Backend API - all frontends share this upstream
upstream backend {
    server localhost:8080;
}

# ---------------------------------------------------------------------------
# Primary domain - routes to whichever frontend is currently "best"
# Change the proxy_pass port in "/" to switch the primary frontend.
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    server_name bytecode.news www.bytecode.news;

    ssl_certificate /etc/letsencrypt/live/bytecode.news/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bytecode.news/privkey.pem;

    # API proxy - strips /api prefix and forwards to the backend
    location /api/ {
        proxy_pass http://backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend - currently points to Next.js on port 3000
    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------------------------------------------------------------------------
# Frontend: Next.js (in-repo frontend/)
# Port 3000
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    server_name nextjs.bytecode.news;

    ssl_certificate /etc/letsencrypt/live/bytecode.news/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bytecode.news/privkey.pem;

    location /api/ {
        proxy_pass http://backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------------------------------------------------------------------------
# Frontend: Primate (placeholder - blue's implementation)
# Port 4000
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    server_name primate.bytecode.news;

    ssl_certificate /etc/letsencrypt/live/bytecode.news/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bytecode.news/privkey.pem;

    location /api/ {
        proxy_pass http://backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://localhost:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------------------------------------------------------------------------
# HTTP -> HTTPS redirect for all domains
# Add new subdomains here when adding a frontend.
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name bytecode.news www.bytecode.news nextjs.bytecode.news primate.bytecode.news;
    return 301 https://$host$request_uri;
}
