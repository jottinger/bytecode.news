server {
	server_name reference.bytecode.news;
#	root /srv/www/bytecode/static;
#	index index.html;

	listen [::]:443 ssl ipv6only=on; # managed by Certbot
	listen 443 ssl; # managed by Certbot
	ssl_certificate /etc/letsencrypt/live/bytecode.news/fullchain.pem; # managed by Certbot
	ssl_certificate_key /etc/letsencrypt/live/bytecode.news/privkey.pem; # managed by Certbot
	include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
	ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

	access_log /srv/www/bytecode/logs/access-ref.log;
	error_log /srv/www/bytecode/logs/error-ref.log;

	location / {
		proxy_pass http://127.0.0.1:3001;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		server_tokens off;
		proxy_hide_header Server;
		proxy_hide_header X-Powered-By;

	}
}

server {
	server_name api.bytecode.news;
#	root /srv/www/bytecode/api;
#	index index.html;

	access_log /srv/www/bytecode/logs/access-api.log;
	error_log /srv/www/bytecode/logs/error-api.log;

 location / {
      proxy_pass http://localhost:8080;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
      proxy_set_header X-Forwarded-Port $http_x_forwarded_port;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      server_tokens off;
      proxy_hide_header Server;
      proxy_hide_header X-Powered-By;
  }

	listen [::]:443 ssl; # managed by Certbot
	listen 443 ssl; # managed by Certbot
	ssl_certificate /etc/letsencrypt/live/bytecode.news/fullchain.pem; # managed by Certbot
	ssl_certificate_key /etc/letsencrypt/live/bytecode.news/privkey.pem; # managed by Certbot
	include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
	ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

