# bytecode.news nginx configuration
#
# Multi-frontend reverse proxy for Nevet.
# Each frontend gets its own subdomain, all sharing the same backend API.
#
# This config is HTTP-only. After deploying it, run certbot to add TLS:
#   sudo mkdir -p /var/www/certbot
#   sudo certbot --nginx -d bytecode.news -d www.bytecode.news \
#     -d nextjs.bytecode.news -d primate.bytecode.news
# certbot modifies this file to add listen 443, ssl directives, and
# an HTTP -> HTTPS redirect automatically.
#
# Each server block includes a /.well-known/acme-challenge/ location so
# certbot's HTTP-01 challenges resolve without hitting the proxy.
#
# To add a new frontend:
#   1. Copy one of the "Frontend" server blocks below
#   2. Change server_name to the new subdomain
#   3. Change proxy_pass in the "/" location to the new frontend's port
#   4. Test: sudo nginx -t && sudo systemctl reload nginx
#   5. Run certbot for the new subdomain: sudo certbot --nginx -d <subdomain>
#   6. Add the new origin to the backend's CORS_ORIGINS env var and restart
#
# Wildcard TLS alternative (requires Cloudflare DNS):
#   sudo certbot certonly --dns-cloudflare \
#     --dns-cloudflare-credentials /etc/letsencrypt/cloudflare.ini \
#     -d bytecode.news -d '*.bytecode.news'
#   Then manually add ssl_certificate directives to each server block.

# Backend API - all frontends share this upstream
upstream backend {
    server localhost:8080;
}

# ---------------------------------------------------------------------------
# Primary domain - routes to whichever frontend is currently "best"
# Change the proxy_pass port in "/" to switch the primary frontend.
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name bytecode.news www.bytecode.news;

    # certbot HTTP-01 challenge responses
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API proxy - strips /api prefix and forwards to the backend
    location /api/ {
        proxy_pass http://backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend - currently points to Next.js on port 3000
    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------------------------------------------------------------------------
# Frontend: Next.js (in-repo frontend/)
# Port 3000
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name nextjs.bytecode.news;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        proxy_pass http://backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------------------------------------------------------------------------
# Frontend: Primate (placeholder - blue's implementation)
# Port 4000
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name primate.bytecode.news;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        proxy_pass http://backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://localhost:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
