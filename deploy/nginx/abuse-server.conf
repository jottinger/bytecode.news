# Shared server-level abuse handling for Nevet frontend server blocks.
# Include this inside each frontend `server {}` block (ui-reference/ui-basic/etc),
# after ACME challenge handling and before normal proxy locations:
#
#   include /etc/nginx/conf.d/bytecode-abuse-server.conf;

# Log only suspicious hits to a dedicated file for fail2ban.
access_log /var/log/nginx/bytecode-abuse.log bytecode_abuse if=$bytecode_abuse_hit;

# Soft per-IP controls (protects before durable bans engage).
limit_req zone=bytecode_per_ip burst=20 nodelay;
limit_conn bytecode_conn_per_ip 30;

# Hard deny for suspicious hits.
if ($bytecode_abuse_hit = 1) {
    return 403;
}
