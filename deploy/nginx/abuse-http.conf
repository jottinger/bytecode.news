# Shared HTTP-level abuse detection for Nevet frontends.
# Load this from the nginx `http {}` context, for example:
#   include /etc/nginx/conf.d/bytecode-abuse-http.conf;
#
# This file is intentionally frontend-agnostic so it can be reused by
# ui-reference, ui-basic, and future UIs.

# Basic per-IP rate limiting (soft shield, separate from fail2ban).
limit_req_zone $binary_remote_addr zone=bytecode_per_ip:10m rate=8r/s;
limit_conn_zone $binary_remote_addr zone=bytecode_conn_per_ip:10m;

# Signal: multipart form submissions are suspicious for current UIs.
map $http_content_type $bytecode_is_multipart {
    default 0;
    "~*multipart/form-data" 1;
}

# Signal: common scan/probe request paths.
map $request_uri $bytecode_is_probe_path {
    default 0;
    "~*^/(wp-login\.php|xmlrpc\.php|wp-admin(?:/|$)|wp-content(?:/|$)|wp-includes(?:/|$))" 1;
    "~*^/(\.env(?:$|/)|vendor/phpunit(?:/|$)|HNAP1(?:$|/)|boaform/admin/formLogin(?:$|/)|cgi-bin(?:/|$))" 1;
}

# Aggregate suspicious marker.
map "$bytecode_is_multipart:$bytecode_is_probe_path" $bytecode_abuse_hit {
    default 0;
    "~^1:" 1;
    "~^.:1$" 1;
}

# Human-readable reason for logging and fail2ban pattern matching.
map "$bytecode_is_multipart:$bytecode_is_probe_path" $bytecode_abuse_reason {
    default "";
    "~^1:" "multipart";
    "~^.:1$" "probe-path";
}

# Dedicated abuse log format (easy for fail2ban regex).
log_format bytecode_abuse
    '$remote_addr host=$host status=$status '
    'reason="$bytecode_abuse_reason" '
    'method="$request_method" uri="$request_uri" '
    'ct="$http_content_type" ua="$http_user_agent"';
