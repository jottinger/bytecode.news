spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:tc:postgresql:17://nevet
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    clean-disabled: true
    enabled: true
    out-of-order: true
  mail:
    host: localhost
    port: 3025
  threads:
    virtual:
      enabled: true

streampack:
  base-url: http://localhost:8080
  irc:
    enabled: false

jakarta:
  persistence:
    jdbc:
      url: jdbc:tc:postgresql:17://nevet
hibernate:
  dialect: org.hibernate.dialect.PostgreSQLDialect
