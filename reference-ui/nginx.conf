map $http_user_agent $is_crawler {
    default 0;
    ~*googlebot 1;
    ~*bingbot 1;
    ~*slurp 1;
    ~*duckduckbot 1;
    ~*baiduspider 1;
    ~*yandexbot 1;
    ~*facebookexternalhit 1;
    ~*twitterbot 1;
    ~*linkedinbot 1;
    ~*whatsapp 1;
    ~*telegrambot 1;
    ~*discordbot 1;
    ~*applebot 1;
}

server {
    listen 3001;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass ${BACKEND_SCHEME}://${BACKEND_HOST}/;
        proxy_ssl_server_name on;
        proxy_set_header Host ${BACKEND_HOST};
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Sitemap always proxied to backend
    location = /sitemap.xml {
        proxy_pass ${BACKEND_SCHEME}://${BACKEND_HOST}/sitemap.xml;
        proxy_ssl_server_name on;
        proxy_set_header Host ${BACKEND_HOST};
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # RSS feed always proxied to backend
    location = /feed.xml {
        proxy_pass ${BACKEND_SCHEME}://${BACKEND_HOST}/feed.xml;
        proxy_ssl_server_name on;
        proxy_set_header Host ${BACKEND_HOST};
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Robots.txt with sitemap reference
    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nAllow: /\nSitemap: $scheme://$host/sitemap.xml\nRSS: $scheme://$host/feed.xml\n";
    }

    # Crawler routing: serve SSR pages for bot user-agents
    location /posts/ {
        if ($is_crawler) {
            rewrite ^/posts/(.*)$ /ssr/posts/$1 last;
        }
        try_files $uri $uri/ /index.html;
    }

    location /pages/ {
        if ($is_crawler) {
            rewrite ^/pages/(.*)$ /ssr/pages/$1 last;
        }
        try_files $uri $uri/ /index.html;
    }

    location = /about {
        if ($is_crawler) {
            rewrite ^ /ssr/pages/about last;
        }
        try_files $uri $uri/ /index.html;
    }

    # SSR endpoints proxied to backend
    location /ssr/ {
        internal;
        proxy_pass ${BACKEND_SCHEME}://${BACKEND_HOST}/ssr/;
        proxy_ssl_server_name on;
        proxy_set_header Host ${BACKEND_HOST};
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        if ($is_crawler) {
            rewrite ^/$ /ssr/ last;
        }
        try_files $uri $uri/ /index.html;
    }
}
