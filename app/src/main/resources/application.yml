spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:.env.properties
      - optional:file:../.env[.properties]
      - optional:file:../.env.properties
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nevet}
    username: ${DB_USERNAME:nevet}
    password: ${DB_PASSWORD:nevet}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    clean-disabled: true
    enabled: true
    out-of-order: true
  threads:
    virtual:
      enabled: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:25}
  ai: {}
  application:
    name: nevet
    version: 3.0
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid,email,profile
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}

streampack:
  base-url: ${BASE_URL:http://localhost:8080}
  jwt:
    secret: ${JWT_SECRET:change-me-in-production}
  console:
    enabled: ${CONSOLE_ENABLED:false}
  mail:
    enabled: ${MAIL_ENABLED:false}
  irc:
    enabled: ${IRC_ENABLED:false}
  karma:
    immune-subjects: ${KARMA_IMMUNE_SUBJECTS:nevet}
  weather:
    api-key: ${OPENWEATHERMAP_API_KEY:change-me}
  discord:
    enabled: ${DISCORD_ENABLED:false}
    application-id: ${DISCORD_APPLICATION_ID:no-id}
    public-key: ${DISCORD_PUBLIC_KEY:no-key}
    permissions: 3072
    token: ${DISCORD_BOT_TOKEN:no-token}
    signal-character: "!"
  slack:
    enabled: ${SLACK_ENABLED:false}
    signal-character: ${SLACK_SIGNAL:!}
  ai:
    enabled: ${AI_ENABLED:false}
    api-key: ${ANTHROPIC_API_KEY:}
management:
  info:
    git:
      mode: full
    build:
      enabled: true
  endpoints:
    web:
      exposure:
        include: info,health

springdoc:
  api-docs:
    enabled: true
